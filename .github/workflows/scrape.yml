name: Scrape and Rewrite

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours
  workflow_dispatch: {}

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd scraper
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd scraper
          source .venv/bin/activate
          python main.py
      - name: Run AI enrichment
        env:
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd ai
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
          python -c "from engine import rewrite_summary; print('AI engine ready')"
