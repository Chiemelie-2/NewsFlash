name: Scrape and Rewrite

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours
  workflow_dispatch: {}

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd scraper
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements.txt
      - name: Run scraper
        run: |
          cd scraper
          source .venv/bin/activate
          python main.py
      # future steps: call AI engine and update DB
